version: '3.8'

services:
  pocketpay-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocketpay-server
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./pocketpay.db}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - EMAIL_ADDRESS=${EMAIL_ADDRESS}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_EXPIRE=${ACCESS_EXPIRE}
      - REFRESH_EXPIRE=${REFRESH_EXPIRE}
      - OTP_TOKEN_EXPIRE_MIN=${OTP_TOKEN_EXPIRE_MIN}
      - PASS_RST_TOKEN_EXPIRE_MIN=${PASS_RST_TOKEN_EXPIRE_MIN}
      - NEW_USER_REWARD_WITH_REFERRAL=${NEW_USER_REWARD_WITH_REFERRAL}
      - NEW_USER_REWARD_WITH_NO_REFERRAL=${NEW_USER_REWARD_WITH_NO_REFERRAL}
      - USER_REFERRAL_REWARD=${USER_REFERRAL_REWARD}
      - SERVICE_CHARGE=${SERVICE_CHARGE}
      - VERSION=${VERSION}
      - DEBUG=${DEBUG}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - SALT=${SALT}
      - SERVICE_ACCOUNT_PATH=${SERVICE_ACCOUNT_PATH}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL}
      - DEFAULT_ADMIN_PHONE=${DEFAULT_ADMIN_PHONE}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME}
      - DEFAULT_USER_EMAIL=${DEFAULT_USER_EMAIL}
      - DEFAULT_USER_PHONE=${DEFAULT_USER_PHONE}
      - DEFAULT_USER_PASSWORD=${DEFAULT_USER_PASSWORD}
      - DEFAULT_USER_NAME=${DEFAULT_USER_NAME}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    networks:
      - pocketpay-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  pocketpay-network:
    driver: bridge

volumes:
  pocketpay-data:
