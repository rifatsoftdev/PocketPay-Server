<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PocketPay - Reset Password</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card Container */
        .reset-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }

        /* Floating Input Labels */
        .form-floating>.form-control {
            border-radius: 12px;
            padding: 20px 12px 8px 12px;
            border: 1px solid #ced4da;
            background: transparent;
            transition: all 0.3s ease;
        }

        .form-floating>.form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 8px rgba(79, 70, 229, 0.2);
        }

        .form-floating>label {
            top: 10px;
            left: 12px;
            font-size: 0.9rem;
            color: #6c757d;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .form-floating>.form-control:focus~label,
        .form-floating>.form-control:not(:placeholder-shown)~label {
            top: -10px;
            left: 12px;
            font-size: 0.75rem;
            color: #4f46e5;
            background: #fff;
            padding: 0 4px;
        }

        /* Card Header */
        .reset-card h2 {
            text-align: center;
            font-weight: 700;
            color: #4f46e5;
            margin-bottom: 10px;
        }

        .reset-card p {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* Button */
        .btn-primary {
            width: 100%;
            background: #4f46e5;
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        /* Message Text */
        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: #999;
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <h2>PocketPay</h2>
        <p>Set your new password</p>

        <form id="resetForm">
            <input type="hidden" name="password_token" value="{{ password_token }}" />

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="new_password" placeholder="New Password" required />
                <label for="new_password">New Password</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="confirm_password" placeholder="Confirm Password"
                    required />
                <label for="confirm_password">Confirm Password</label>
            </div>

            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>

        <p id="message"></p>
    </div>

    <!-- <div class="footer">
    &copy; 2026 PocketPay Inc. All rights reserved.
</div> -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById("resetForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const password_token = form.password_token.value;
            const new_password = document.getElementById("new_password").value;
            const confirm_password =
                document.getElementById("confirm_password").value;

            const message = document.getElementById("message");

            if (new_password !== confirm_password) {
                message.style.color = "red";
                message.innerText = "Passwords do not match";
                return;
            }

            const res = await fetch("/auth/set-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password_token, new_password }),
            });

            const data = await res.json();
            if (data.success) {
                message.style.color = "green";
                message.innerText = data.message;
                form.reset();
            } else {
                message.style.color = "red";
            }
            message.innerText = data.message || data.detail || "Unable to reset password";
        });
    </script>
</body>

</html>
