<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Error - PocketPay</title>
    <link rel="icon" type="image/x-icon" href="/static/image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e0f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .error-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            position: relative;
        }

        .error-card h1 {
            font-size: 3rem;
            color: #ef4444;
            /* Red for error */
            margin-bottom: 10px;
        }

        .error-card h3 {
            font-size: 1.5rem;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .error-card p {
            color: #4b5563;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .btn-home {
            background: #4f46e5;
            color: #fff;
            padding: 12px 25px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-home:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            color: #fff;
        }

        .footer {
            text-align: center;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-top: 30px;
        }

        @media(max-width: 480px) {
            .error-card {
                padding: 30px 20px;
            }

            .error-card h1 {
                font-size: 2.5rem;
            }

            .error-card h3 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>

    <div class="error-card">
        <h1>😢 Oops!</h1>
        <h3>Token Expired / Invalid</h3>
        <p>Unfortunately, your reset link has either expired or is invalid. Please request a new link to reset your
            password securely.</p>
        <!-- <a href="/forgot-password" class="btn-home">Request New Link</a> -->
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
