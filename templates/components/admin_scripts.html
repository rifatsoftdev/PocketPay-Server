<script src="/static/bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>
<script src="/static/js/auth.js?v=3"></script>
<script>
    async function loadAdminInfo() {
        try {
            const response = await fetch("/admin/profile-data", {
                method: "GET",
                headers: { ...Auth.getAuthHeader(), "Content-Type": "application/json" },
                credentials: "include",
            });
            if (response.ok) {
                const data = await response.json();
                document.getElementById("headerAdminName").innerText = data.data.full_name || "Admin";
                if (data.data.profile_image_url) {
                    document.querySelector("#headerAdminAvatar img").src = data.data.profile_image_url;
                }
            }
        } catch (err) {
            console.error(err);
        }
    }

    function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        if (!sidebar) return;

        if (window.matchMedia("(max-width: 1024px)").matches) {
            sidebar.classList.toggle("show");
        } else {
            sidebar.classList.toggle("collapsed");
        }
    }
    function toggleAdminDropdown() { document.getElementById("adminDropdown").classList.toggle("show"); }
    function logout() { Auth.logout(); }

    document.addEventListener("DOMContentLoaded", function() {
        loadAdminInfo();
        document.addEventListener("click", function(e) {
            if (!e.target.closest(".admin-dropdown")) {
                document.getElementById("adminDropdown").classList.remove("show");
            }
        });
    });
</script>
