<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error</title>
    <!-- Bootstrap CSS -->
    <link href="/static/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa; /* Light gray background */
            color: #343a40; /* Dark text color */
            font-family: Arial, sans-serif;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h2 class="mb-3">Internal Server Error</h2>
        <p class="lead mb-4">Oops! Something went wrong on our server. Please try again later.</p>
        <a href="/" class="btn btn-primary btn-lg">Go to Homepage</a>
    </div>
    <!-- Bootstrap Bundle with Popper -->
    <script src="/static/bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>
</body>
</html>
